<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERNET // CENTRAL SYSTEM v4.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-dark: #030305;
      --panel-bg: #0b0c10;
      --input-bg: #11141a;
      --border-neon: #00f0ff;
      --accent-pink: #ff0055;
      --text-green: #39ff14;
      --text-white: #ffffff;
      --text-gray: #4f5b66;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-white);
      font-family: 'Prompt', 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::after {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
      z-index: 9999;
      opacity: 0.3;
      pointer-events: none;
      background-size: 100% 4px, 6px 100%;
    }

    .matrix-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 30%, rgba(0, 240, 255, 0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 10;
    }

    .terminal-card {
      background: var(--panel-bg);
      border: 2px solid var(--border-neon);
      border-radius: 4px;
      padding: 25px;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), inset 0 0 15px rgba(0, 240, 255, 0.05);
    }

    .terminal-card::before {
      content: ''; position: absolute; top: -2px; left: -2px; width: 15px; height: 15px; border-top: 4px solid var(--accent-pink); border-left: 4px solid var(--accent-pink);
    }
    .terminal-card::after {
      content: ''; position: absolute; bottom: -2px; right: -2px; width: 15px; height: 15px; border-bottom: 4px solid var(--accent-pink); border-right: 4px solid var(--accent-pink);
    }

    .header-area {
      text-align: center;
      margin-bottom: 25px;
      border-bottom: 1px dashed var(--text-gray);
      padding-bottom: 15px;
    }
    .header-area h1 {
      font-family: 'Share Tech Mono', sans-serif;
      font-size: 24px;
      color: var(--border-neon);
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
      letter-spacing: 2px;
    }
    .header-area p {
      font-size: 12px;
      color: var(--text-gray);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--border-neon);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .input-ctrl {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--text-gray);
      padding: 12px 14px;
      color: var(--text-white);
      font-family: inherit;
      font-size: 14px;
      border-radius: 2px;
      outline: none;
      transition: all 0.2s ease;
    }
    .input-ctrl:focus {
      border-color: var(--text-green);
      box-shadow: 0 0 8px rgba(57, 255, 20, 0.2);
    }
    textarea.input-ctrl {
      height: 75px;
      resize: none;
    }

    .action-gate-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--text-green);
      color: var(--text-green);
      font-family: 'Share Tech Mono', sans-serif;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      margin-top: 10px;
      box-shadow: inset 0 0 4px rgba(57, 255, 20, 0.2);
    }
    .action-gate-btn:hover {
      background: var(--text-green);
      color: #000;
      box-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
    }
    .action-gate-btn:disabled {
      opacity: 0.3; cursor: not-allowed;
    }

    .hacker-console-input {
      margin-top: 20px;
      display: flex;
      border: 1px solid rgba(255, 0, 85, 0.3);
      background: #000;
      padding: 8px 12px;
      align-items: center;
    }
    .console-sign {
      color: var(--accent-pink);
      font-family: 'Share Tech Mono', sans-serif;
      margin-right: 10px;
      font-size: 14px;
    }
    .console-field {
      background: transparent;
      border: none;
      color: var(--accent-pink);
      outline: none;
      font-family: 'Share Tech Mono', sans-serif;
      width: 100%;
      font-size: 14px;
    }

    /* ADMIN DASHBOARD UI */
    .admin-viewport { display: none; width: 100%; }
    
    .status-bar {
      display: flex;
      justify-content: space-between;
      background: #111;
      padding: 8px 12px;
      font-size: 11px;
      font-family: 'Share Tech Mono', sans-serif;
      border: 1px solid var(--text-gray);
      color: var(--border-neon);
      margin-bottom: 15px;
    }
    
    .tab-grid {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
    }
    .tab-trigger {
      flex: 1;
      background: #090a0f;
      border: 1px solid var(--text-gray);
      color: var(--text-gray);
      padding: 10px;
      font-family: 'Share Tech Mono', sans-serif;
      cursor: pointer;
      font-size: 12px;
    }
    .tab-trigger.active {
      border-color: var(--border-neon);
      color: var(--border-neon);
      background: rgba(0, 240, 255, 0.05);
    }

    .data-bucket { display: none; }
    .data-bucket.active { display: block; }

    .cyber-card {
      background: #07080c;
      border-left: 3px solid var(--border-neon);
      border-top: 1px solid #1c202a;
      border-right: 1px solid #1c202a;
      border-bottom: 1px solid #1c202a;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .card-row-main {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      color: var(--text-white);
      margin-bottom: 5px;
    }
    .card-meta {
      color: var(--text-gray);
      font-size: 12px;
      font-family: 'Share Tech Mono', sans-serif;
      margin-bottom: 8px;
    }
    .card-meta span { color: var(--border-neon); }
    
    .secure-payload {
      background: rgba(255, 0, 85, 0.05);
      border: 1px solid rgba(255, 0, 85, 0.2);
      padding: 8px;
      font-size: 12px;
      color: #ff99bb;
    }
    .secure-payload label {
      display: block;
      font-size: 9px;
      color: var(--accent-pink);
      font-family: 'Share Tech Mono', sans-serif;
      font-weight: bold;
    }

    .ctrl-cluster {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .mini-btn {
      flex: 1;
      padding: 8px;
      background: transparent;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #fff;
    }
    .btn-yes { border-color: var(--text-green); color: var(--text-green); }
    .btn-yes:hover { background: var(--text-green); color: #000; }
    .btn-no { border-color: var(--accent-pink); color: var(--accent-pink); }
    .btn-no:hover { background: var(--accent-pink); color: #000; }

    .screen-overlay { display: none; text-align: center; padding: 30px 10px; }
    .screen-overlay h2 { color: var(--text-green); font-family: 'Share Tech Mono', sans-serif; margin-bottom: 10px; }

    .toast-popup {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #000; border: 1px solid var(--border-neon); padding: 8px 16px;
      font-size: 12px; color: var(--border-neon); font-family: 'Share Tech Mono', sans-serif;
      opacity: 0; pointer-events: none; transition: 0.2s opacity; z-index: 10000;
    }
    .toast-popup.show { opacity: 1; }
  </style>
</head>
<body>

<div class="matrix-bg"></div>

<div class="container">
  
  <div id="clientUIPanel" class="terminal-card">
    <div id="interactiveForm">
      <div class="header-area">
        <h1>DATA INGESTION GATE</h1>
        <p>RE-CONFIGURED PROTOCOL v4.0</p>
      </div>

      <div class="form-group">
        <label>IDENTITY (ชื่อ / ฉายา)</label>
        <input type="text" id="nodeName" class="input-ctrl" placeholder="เช่น ธันวา" autocomplete="off">
      </div>

      <div class="form-group">
        <label>MASS INDEX (น้ำหนัก - กิโลกรัม)</label>
        <input type="number" step="0.1" id="nodeWeight" class="input-ctrl" placeholder="60.5">
      </div>

      <div class="form-group">
        <label>VERTICAL SCALE (ส่วนสูง - เซนติเมตร)</label>
        <input type="number" id="nodeHeight" class="input-ctrl" placeholder="170">
      </div>

      <div class="form-group">
        <label>ENCRYPTED PREFERENCE (ความชอบส่วนตัว 🔒 ADMIN ONLY)</label>
        <textarea id="nodeSecret" class="input-ctrl" placeholder="ระบุสิ่งที่ชอบยามว่าง เรื่องลึกลับ..."></textarea>
      </div>

      <button class="action-gate-btn" id="gateSubmitBtn" onclick="transmitPayload()">TRANSMIT DATA_</button>
    </div>

    <div id="successScreen" class="screen-overlay">
      <h2>[ TRANSMISSION COMPLETE ]</h2>
      <p style="font-size: 13px; color: var(--text-gray); margin-bottom: 20px;">ส่งข้อมูลความชอบเข้าสู่แผงหลังบ้านแล้ว</p>
      <button class="action-gate-btn" onclick="recycleForm()">REGISTER NEW ID_</button>
    </div>

    <div class="hacker-console-input">
      <span class="console-sign">SYS_CMD ></span>
      <input type="text" id="adminConsoleKey" class="console-field" placeholder="ENTER ACCESS CODE..." autocomplete="off">
    </div>
  </div>


  <div id="masterAdminPanel" class="admin-viewport">
    <div class="status-bar">
      <div>OPERATOR: <span style="color:var(--accent-pink);">ROOT_ADMIN</span></div>
      <div id="liveClock">DATABASE LINK ACTIVE</div>
    </div>

    <div class="tab-grid">
      <button class="tab-trigger active" id="tabBtnPending" onclick="switchTab('pending')">PENDING INBOUND</button>
      <button class="tab-trigger" id="tabBtnApproved" onclick="switchTab('approved')">SECURED ARCHIVE</button>
    </div>

    <div class="terminal-card" style="padding: 18px;">
      <div id="bucketPending" class="data-bucket active">CONNECTING STREAM...</div>
      <div id="bucketApproved" class="data-bucket">CONNECTING STREAM...</div>
    </div>

    <button class="action-gate-btn" style="border-color:var(--accent-pink); color:var(--accent-pink); margin-top:15px;" onclick="killSession()">DISCONNECT ROOT_</button>
  </div>

</div>

<div id="globalToast" class="toast-popup"></div>

<script>
  // 🔑 เปลี่ยนรหัสผ่านแอดมินจำเครื่อง และ อัปเดตลิงก์เซิร์ฟเวอร์ใหม่เรียบร้อยครับ!
  const ACCESS_KEY = "Admin_1";
  const DB_BASE = 'https://maty-f9dca-default-rtdb.firebaseio.com';
  
  let poolPending = {}, poolApproved = {};
  let syncTimer;

  window.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem('rootAuth') === 'true') {
      mountAdminDashboard();
    }
  });

  document.getElementById('adminConsoleKey').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (e.target.value.trim() === ACCESS_KEY) {
        sessionStorage.setItem('rootAuth', 'true');
        mountAdminDashboard();
        popToast("ACCESS GRANTED. WELCOME.");
      } else {
        popToast("CRITICAL: ACCESS DENIED.");
        e.target.value = '';
      }
    }
  });

  function mountAdminDashboard() {
    document.getElementById('clientUIPanel').style.display = 'none';
    document.getElementById('masterAdminPanel').style.display = 'block';
    syncCoreEngine();
    clearInterval(syncTimer);
    syncTimer = setInterval(syncCoreEngine, 2000); // อัปเดตข้อมูลความเร็วสูงทุก 2 วินาทีเรียบลื่น
  }

  function killSession() {
    sessionStorage.removeItem('rootAuth');
    clearInterval(syncTimer);
    location.reload();
  }

  // ฟังก์ชันส่งข้อมูลเข้า Firebase ตัวใหม่
  async function transmitPayload() {
    const name = document.getElementById('nodeName').value.trim();
    const weight = document.getElementById('nodeWeight').value;
    const height = document.getElementById('nodeHeight').value;
    const secret = document.getElementById('nodeSecret').value.trim();

    if (!name || !weight || !height) {
      return popToast("ERROR: REQUIRE MATERIAL DATA");
    }

    const btn = document.getElementById('gateSubmitBtn');
    btn.disabled = true;
    btn.textContent = "PACKING PACKETS...";

    const payload = {
      name: name,
      weight: Number(weight),
      height: Number(height),
      preference: secret || 'ไม่มีข้อมูลความชอบถอดรหัส',
      stamp: Date.now()
    };

    try {
      const response = await fetch(`${DB_BASE}/pending.json`, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      
      if(response.ok) {
        document.getElementById('interactiveForm').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
      } else {
        throw new Error();
      }
    } catch (err) {
      popToast("DATABASE DENIED: CHECK RULES OR NETWORK");
      btn.disabled = false;
      btn.textContent = "TRANSMIT DATA_";
    }
  }

  // ฟังก์ชันดึงข้อมูลแบบ Real-time
  async function syncCoreEngine() {
    try {
      const [res1, res2] = await Promise.all([
        fetch(`${DB_BASE}/pending.json`).then(r => r.json()),
        fetch(`${DB_BASE}/approved.json`).then(r => r.json())
      ]);
      poolPending = res1 || {};
      poolApproved = res2 || {};
      renderAdminView();
    } catch(e) { 
      document.getElementById('liveClock').textContent = "SYNC_ERROR";
    }
  }

  function renderAdminView() {
    document.getElementById('liveClock').textContent = "SYS_STATUS: ACTIVE // REALTIME";
    
    const pk = Object.keys(poolPending);
    const ak = Object.keys(poolApproved);

    const pendingBox = document.getElementById('bucketPending');
    if(pk.length === 0) {
      pendingBox.innerHTML = `<div style="text-align:center; color:var(--text-gray); padding:30px 0; font-size:12px;">[ ไม่มีข้อมูลส่งเข้ามาใหม่ ]</div>`;
    } else {
      pendingBox.innerHTML = pk.map(id => {
        const item = poolPending[id];
        return `
          <div class="cyber-card">
            <div class="card-row-main"><div>// ${item.name}</div></div>
            <div class="card-meta">SCALE: <span>${item.weight} KG</span> / <span>${item.height} CM</span></div>
            <div class="secure-payload">
              <label>🔒 ENCRYPTED_PREFERENCE</label>${item.preference}
            </div>
            <div class="ctrl-cluster">
              <button class="mini-btn btn-yes" onclick="fireApprove('${id}')">ACCEPT</button>
              <button class="mini-btn btn-no" onclick="fireReject('${id}')">PURGE</button>
            </div>
          </div>`;
      }).join('');
    }

    const approvedBox = document.getElementById('bucketApproved');
    if(ak.length === 0) {
      approvedBox.innerHTML = `<div style="text-align:center; color:var(--text-gray); padding:30px 0; font-size:12px;">[ คลังข้อมูลอนุมัติยังว่างเปล่า ]</div>`;
    } else {
      approvedBox.innerHTML = ak.map(id => {
        const item = poolApproved[id];
        return `
          <div class="cyber-card" style="border-left-color: var(--text-green);">
            <div class="card-row-main"><div style="color:var(--text-green)">✔ ${item.name}</div></div>
            <div class="card-meta">SCALE: <span>${item.weight} KG</span> / <span>${item.height} CM</span></div>
            <div class="secure-payload" style="background:rgba(57,255,20,0.02); border-color:rgba(57,255,20,0.1); color:#b3ffb3;">
              <label style="color:var(--text-green)">🔒 STORED_PREFERENCE</label>${item.preference}
            </div>
            <div class="ctrl-cluster">
              <button class="mini-btn btn-no" style="width:100%;" onclick="fireWipe('${id}')">DELETE FROM HARD DRIVE</button>
            </div>
          </div>`;
      }).join('');
    }
  }

  async function fireApprove(id) {
    const data = poolPending[id];
    await fetch(`${DB_BASE}/approved/${id}.json`, { method: 'PUT', body: JSON.stringify(data) });
    await fetch(`${DB_BASE}/pending/${id}.json`, { method: 'DELETE' });
    syncCoreEngine();
    popToast("RECORD ARCHIVED.");
  }

  async function fireReject(id) {
    await fetch(`${DB_BASE}/pending/${id}.json`, { method: 'DELETE' });
    syncCoreEngine();
    popToast("RECORD PURGED.");
  }

  async function fireWipe(id) {
    await fetch(`${DB_BASE}/approved/${id}.json`, { method: 'DELETE' });
    syncCoreEngine();
    popToast("RECORD WIPED PERMANENTLY.");
  }

  function switchTab(mode) {
    document.getElementById('tabBtnPending').classList.toggle('active', mode === 'pending');
    document.getElementById('tabBtnApproved').classList.toggle('active', mode === 'approved');
    document.getElementById('bucketPending').classList.toggle('active', mode === 'pending');
    document.getElementById('bucketApproved').classList.toggle('active', mode === 'approved');
  }

  function recycleForm() {
    document.getElementById('nodeName').value = '';
    document.getElementById('nodeWeight').value = '';
    document.getElementById('nodeHeight').value = '';
    document.getElementById('nodeSecret').value = '';
    document.getElementById('interactiveForm').style.display = 'block';
    document.getElementById('successScreen').style.display = 'none';
    const btn = document.getElementById('gateSubmitBtn');
    btn.disabled = false;
    btn.textContent = "TRANSMIT DATA_";
  }

  let toastTimeout;
  function popToast(msg) {
    const toast = document.getElementById('globalToast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
